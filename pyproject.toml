[project]
name = "mebuki"
version = "2.3.0"
description = "mebuki: 投資回避に特化した投資分析ツール"
authors = [
    {name = "shu", email = "shu.sorahiro@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["requests (>=2.32.5,<3.0.0)", "python-dotenv (>=1.2.1,<2.0.0)", "pandas (>=3.0.0,<4.0.0)", "numpy (>=2.4.1,<3.0.0)", "python-dateutil (>=2.9.0.post0,<3.0.0)", "jinja2 (>=3.1.6,<4.0.0)", "keyring (>=25.7.0,<26.0.0)", "pydantic (>=2.12.5,<3.0.0)", "beautifulsoup4 (>=4.14.3,<5.0.0)", "mcp (>=1.2.1)", "questionary", "PyYAML (>=6.0.2)"]

[project.scripts]
mebuki = "mebuki.app.cli:main"

[tool.poetry]
packages = [
    {include = "mebuki", from = "."}
]

[tool.poetry.group.dev.dependencies]
pytest = "^9.0.0"
pytest-asyncio = "^1.2.0"

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
