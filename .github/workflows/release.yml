name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Type check
        run: poetry run pyright blue_ticker/

      - name: Test
        run: poetry run pytest tests/ -q

  release:
    needs: [check]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build CLI Binary (PyInstaller)
        run: |
          poetry run pip install pyinstaller
          poetry run pyinstaller blue_ticker.spec
        shell: bash

      - name: Package Binary
        run: |
          mkdir -p release
          cp -r dist/ticker release/
          cd release
          tar -czvf blue-ticker-macos-arm64.tar.gz ticker
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/blue-ticker-macos-arm64.tar.gz

      - name: Calculate SHA256
        run: |
          SHA256=$(shasum -a 256 release/blue-ticker-macos-arm64.tar.gz | awk '{ print $1 }')
          echo "SHA256=$SHA256" >> $GITHUB_ENV
        shell: bash

      - name: Update Homebrew Formula
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          SHA256=${{ env.SHA256 }}
          
          # Clone the tap repository
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/sollahiro/homebrew-blue-ticker.git homebrew-tap
          
          # Ensure Formula directory exists (handles empty repo)
          mkdir -p homebrew-tap/Formula
          
          # Update the formula file in the tap repo
          # We use the template from the main repo
          cat Formula/blue-ticker.rb | \
            sed "s|url \".*\"|url \"https://github.com/sollahiro/blue-ticker/releases/download/v${VERSION}/blue-ticker-macos-arm64.tar.gz\"|" | \
            sed "s|sha256 \".*\"|sha256 \"${SHA256}\"|" | \
            sed "s|version \".*\"|version \"${VERSION}\"|" > homebrew-tap/Formula/blue-ticker.rb

          rm -f homebrew-tap/Formula/mebuki.rb homebrew-tap/formula_renames.json
          
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update blue-ticker to v${VERSION}" || echo "No changes to commit"
          git branch -M main
          git push origin main
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/blue-ticker-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
