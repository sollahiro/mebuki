name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build CLI Binary (PyInstaller)
        run: |
          # Use poetry run to ensure pyinstaller is available in the venv
          poetry run pip install pyinstaller
          poetry run pyinstaller --onefile --name mebuki mebuki/cli.py --add-data "assets/data_j.csv:assets" --add-data "backend/prompts.py:backend"
        shell: bash

      - name: Package Binary
        run: |
          mkdir -p release
          cp dist/mebuki release/
          cd release
          tar -czvf mebuki-macos-arm64.tar.gz mebuki
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: release/mebuki-macos-arm64.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: release/mebuki-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
